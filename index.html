<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <title>Parkour MVP</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0d0d14;
        color: #ddd;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }
      .wrap {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        flex-direction: column;
        gap: 12px;
      }
      canvas {
        border: 2px solid #333;
        image-rendering: pixelated;
        box-shadow: 0 0 40px rgba(95, 196, 255, 0.15);
      }
      h1 { margin: 0; font-size: 18px; font-weight: 500; letter-spacing: 1px; }
      .legend { font-size: 12px; color: #888; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>PARKOUR · MVP</h1>
      <canvas id="game"></canvas>
      <div class="legend">A / D — 좌우 이동 &nbsp;·&nbsp; W — 점프 &nbsp;·&nbsp; SPACE — 다음 스테이지 &nbsp;·&nbsp; R — 재시작</div>
    </div>
    <script type="module">
      import { startGame } from './src/game.js';
      startGame(document.getElementById('game'));
    </script>
  </body>
</html>
